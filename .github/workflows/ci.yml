name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # Backend Steps
      # ----------------------------------------------------------------
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and package backend
        working-directory: ./backend
        run: mvn clean install

      # ----------------------------------------------------------------
      # Frontend Steps
      # ----------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      # ----------------------------------------------------------------
      # Integration and E2E Test Steps
      # ----------------------------------------------------------------
      - name: Start backend server
        working-directory: ./backend
        run: |
          java -jar target/*.jar &
          echo "Backend server started"

      - name: Wait for backend server
        run: |
          echo "Waiting for backend to be ready..."
          npx wait-on http://localhost:8080 -t 60000
          echo "Backend is ready!"

      - name: Start frontend preview server
        working-directory: ./frontend
        run: |
          npm run preview &
          echo "Frontend preview server started"

      - name: Wait for frontend preview server
        run: |
          echo "Waiting for frontend to be ready..."
          npx wait-on http://localhost:4173 -t 30000
          echo "Frontend is ready!"

      - name: Run all tests
        working-directory: ./backend
        run: >
          mvn test
          -Dtest="*ServiceTest,*ApiTest,CucumberTest,*UITest"
          -Dwebdriver.chrome.args="--headless,--no-sandbox,--disable-dev-shm-usage,--disable-gpu,--window-size=1920,1080"

      # ----------------------------------------------------------------
      # Reporting Steps
      # ----------------------------------------------------------------
      - name: Generate test report
        if: always()
        working-directory: ./backend
        run: mvn surefire-report:report-only

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/target/site/
